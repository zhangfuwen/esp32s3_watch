## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: ">=5.2.0"

  ## LVGL GUI library (ESP-IDF built-in since v5.0)
  lvgl/lvgl:
    version: "^8.4.0"
    public: true

  ## ESP-IDF built-in components (no version needed)
  ## - fatfs
  ## - nvs_flash
  ## - esp_lcd
  ## - esp_timer
  ## - driver (I2C, SPI, GPIO)
  ## - esp_wifi
  ## - bt (Bluetooth)
  ## - freertos
  ## - esp_common
